<!-- Add Ticket Section -->
<div class="w-full max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 mt-4">
  <h2 class="text-lg font-bold text-gray-800 mb-4">Create New Ticket</h2>
  <div class="space-y-3 text-left">
    <input type="text" #ticketTitle placeholder="What's the issue?" 
      class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm shadow-inner">
    <textarea #ticketDescription placeholder="Tell us more about it..." rows="2"
      class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm shadow-inner"></textarea>
    <button (click)="addTicket(ticketTitle.value, ticketDescription.value); ticketTitle.value = ''; ticketDescription.value = '';" 
      class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-100 cursor-pointer">
      Add Ticket
    </button>
  </div>
</div>

<!-- Ticket List Section -->
<div class="w-full max-w-md mx-auto mb-10">
  <div class="flex items-center justify-between mb-6 px-1">
    <h2 class="text-xl font-bold text-gray-800">Ticket List</h2>
    
    <!-- Modern Select Filter -->
    <div class="relative w-40">
      <select 
        #filterSelect
        (change)="updateFilter($event)"
        class="appearance-none w-full pl-3 pr-8 py-2 bg-white border border-gray-200 rounded-xl text-xs font-bold text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer shadow-sm hover:border-gray-300 transition-all"
      >
        <option value="All">All Tickets</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Closed">Closed</option>
      </select>
      <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Tickets Container -->
  <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
    @for (ticket of allTickets(); track ticket.id) {
      <app-ticket-item 
        [ticket]="ticket" 
        (removeTicket)="removeTicket($event)" 
        (updateStatus)="updateStatus($event.id, $event.newStatus)">
      </app-ticket-item>
    } @empty {
      <div class="flex flex-col items-center justify-center py-12 bg-white rounded-2xl border-2 border-dashed border-gray-100">
        <div class="p-3 bg-gray-50 rounded-full mb-3 text-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
          </svg>
        </div>
        <p class="text-gray-400 font-medium italic text-sm">No tickets to show.</p>
      </div>
    }
  </div>
</div>
